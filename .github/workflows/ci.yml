name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Typecheck
        run: npm run typecheck

      - name: Test API
        run: npm run test --workspace=apps/api
        env:
          # Dummy values so env validation (apps/api/src/config/env.ts) passes in CI;
          # no real external services are called by the unit test suite.
          API_BASE_URL: http://localhost:4000
          WEB_APP_URL: http://localhost:5173
          SUPABASE_URL: https://ci-placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder
          SUPABASE_JWT_SECRET: ci-placeholder
          DEFAULT_ORGANIZATION_ID: 00000000-0000-0000-0000-000000000001
          ANTHROPIC_API_KEY: ci-placeholder
          APOLLO_API_KEY: ci-placeholder
          N8N_BASE_URL: https://ci-placeholder.app.n8n.cloud
          N8N_API_KEY: ci-placeholder
          N8N_WEBHOOK_SECRET: ci-placeholder-secret-value
          INTERNAL_SERVICE_KEY: ci-placeholder-internal-key

      - name: Build API
        run: npm run build:api

      - name: Build web
        run: npm run build:web
