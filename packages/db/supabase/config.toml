project_id = "bluwheelz-sales-platform"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[db.pooler]
enabled = true
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://app.bluwheelz-sales.vercel.app"]
jwt_expiry = 3600
enable_signup = false
enable_confirmations = true

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = true
